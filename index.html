    <!-- 4. FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How are Roam Richer routes actually built?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We don't scrape TripAdvisor. We work with local fixers and long-term residents in each country to map out actual paths they take. Every spot is verified for price, quality, and tourist-trap status."
          }
        },
        {
          "@type": "Question",
          "name": "Is it safe to travel this cheaply?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cheap doesn't mean dangerous. In many of our covered countries, $20/day gets you a clean, safe boutique hostel and incredible fresh food. We prioritize safety in our route selection, focusing on well-traveled but authentic paths."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to book everything in advance?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our routes are designed for flexibility. While we recommend booking your first 2 nights, most of our Roamers book as they go using the apps and local tips we provide in the full guide."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if a place is closed or changed?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Our database is updated weekly. When you access a route, you're getting the most current version. We also provide Alternative Roams for every major stop just in case."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Roam Richer cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Roam Richer route previews are completely free — no agency fees, no hidden charges. Full unlimited access is available when we launch. Join the waitlist for early access."
          }
        }
      ]
    }
    </script>
